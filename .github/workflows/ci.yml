name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync dependencies
        run: uv sync --dev
      - name: Run offline tests with 100% coverage gate
        run: uv run pytest --cov
        # The Lean formal oracle is verified manually via `make oracle-verify`
        # (CI has no Lean toolchain / Mathlib cache).
